<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventJam — Live Mobility Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>

<style>
:root{
--bg:#060610;--s1:#0e0e1c;--s2:#161628;
--accent:#6c63ff;--accent2:#ff6584;
--green:#00f5a0;--yellow:#ffd166;--red:#ff4757;
--text:#e8e8ff;--muted:#5a5a7a;--border:#1e1e38;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;}

header{
position:sticky;top:0;z-index:10;
padding:1rem 2rem;
background:rgba(6,6,16,0.85);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
display:flex;justify-content:space-between;
}

.logo h1{
background:linear-gradient(135deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:900;
}

main{max-width:780px;margin:auto;padding:2rem;}

.input-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.input-box{background:var(--s1);padding:1rem;border-radius:10px;}
input,select{
width:100%;background:transparent;border:none;
color:white;font-size:1rem;outline:none;
}

.btn{
width:100%;margin-top:1rem;
padding:1rem;
background:linear-gradient(135deg,var(--accent),#8b5cf6);
border:none;color:white;font-weight:800;
border-radius:12px;cursor:pointer;
}

#results{display:none;margin-top:2rem;}

.risk-card{
background:rgba(255,255,255,0.03);
padding:1.2rem;border-radius:12px;
border:1px solid var(--border);
margin-bottom:1rem;
}

.route-btn{
display:inline-block;
margin-top:12px;
padding:10px 14px;
border-radius:10px;
background:linear-gradient(135deg,#6c63ff,#8b5cf6);
color:white;
text-decoration:none;
font-weight:700;
}

</style>
</head>

<body>

<header>
  <div class="logo"><h1>EventJam</h1></div>
</header>

<main>

<div class="input-row">
  <div class="input-box">
    <label>FROM</label>
    <input type="text" id="from" placeholder="Koramangala">
  </div>

  <div class="input-box">
    <label>TO</label>
    <input type="text" id="to" placeholder="Whitefield">
  </div>
</div>

<button class="btn" onclick="analyze()">Analyze Route</button>

<div id="results">

  <div id="risk-container"></div>

</div>

</main>

<script>

// MAIN FUNCTION
function analyze(){

const from=document.getElementById('from').value||'Koramangala';
const to=document.getElementById('to').value||'Whitefield';

// 🔥 GOOGLE MAPS LIVE ROUTE LINK
const mapsLink = `https://www.google.com/maps/dir/${encodeURIComponent(from)}/${encodeURIComponent(to)}`;

// SIMPLE DEMO RISK SCORE
const score=Math.floor(Math.random()*100);

let level="low";
if(score>75)level="high";
else if(score>50)level="medium";

document.getElementById('results').style.display='block';

document.getElementById('risk-container').innerHTML=`

<div class="risk-card">
  <h2>Route Risk Score: ${score}/100</h2>
  <p>Risk Level: ${level.toUpperCase()}</p>

  <!-- ✅ GOOGLE MAPS BUTTON ADDED -->
  <a class="route-btn" href="${mapsLink}" target="_blank">
    🗺️ Open Route in Google Maps
  </a>

</div>

`;

}

</script>

</body>
</html>
