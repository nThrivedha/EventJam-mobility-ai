<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventJam — Live Mobility Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060610;--s1:#0e0e1c;--s2:#161628;--accent:#6c63ff;--accent2:#ff6584;--green:#00f5a0;--yellow:#ffd166;--red:#ff4757;--text:#e8e8ff;--muted:#5a5a7a;--border:#1e1e38;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.bg-glow{position:fixed;top:-20%;left:10%;width:500px;height:500px;background:radial-gradient(circle,rgba(108,99,255,0.08),transparent 70%);pointer-events:none;z-index:0;}
.bg-glow2{position:fixed;bottom:-10%;right:5%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,101,132,0.06),transparent 70%);pointer-events:none;z-index:0;}
header{position:sticky;top:0;z-index:10;padding:1.2rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;background:rgba(6,6,16,0.85);backdrop-filter:blur(12px);}
.logo{display:flex;align-items:center;gap:0.8rem;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:grid;place-items:center;font-size:1.2rem;box-shadow:0 0 20px rgba(108,99,255,0.4);}
.logo h1{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{font-size:0.6rem;color:var(--muted);font-family:'Space Mono',monospace;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:1rem;}
.live-pill{background:rgba(0,245,160,0.1);border:1px solid rgba(0,245,160,0.3);color:var(--green);font-size:0.62rem;font-family:'Space Mono',monospace;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 6px var(--green);}50%{opacity:0.3;box-shadow:none;}}
.clock{font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--muted);}
main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem 1.5rem;}
.weather-bar{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:0.9rem 1.2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.2rem;font-size:0.85rem;flex-wrap:wrap;}
.w-label{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;}
.weather-stat strong{font-size:0.95rem;font-weight:700;}
.sep{width:1px;height:30px;background:var(--border);}
.weather-impact{margin-left:auto;font-size:0.75rem;padding:5px 14px;border-radius:20px;font-weight:600;}
.section-label{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:0.8rem;}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.input-box{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;transition:border-color 0.2s,box-shadow 0.2s;}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.1);}
.input-box label{display:block;font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.input-box input,.input-box select{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:600;}
.input-box select option{background:var(--s2);}
.btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;box-shadow:0 4px 20px rgba(108,99,255,0.3);margin-bottom:2rem;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,0.4);}
#results{display:none;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.risk-card{border-radius:14px;padding:1.5rem;margin-bottom:1rem;display:flex;gap:1rem;align-items:flex-start;border:1px solid;}
.risk-card.critical{background:rgba(255,71,87,0.08);border-color:rgba(255,71,87,0.3);}
.risk-card.high{background:rgba(255,71,87,0.06);border-color:rgba(255,71,87,0.22);}
.risk-card.medium{background:rgba(255,209,102,0.06);border-color:rgba(255,209,102,0.22);}
.risk-card.low{background:rgba(0,245,160,0.05);border-color:rgba(0,245,160,0.22);}
.risk-icon{font-size:2rem;line-height:1;}
.risk-body{flex:1;}
.risk-level{font-size:0.58rem;font-family:'Space Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.risk-card.critical .risk-level,.risk-card.high .risk-level{color:var(--red);}
.risk-card.medium .risk-level{color:var(--yellow);}
.risk-card.low .risk-level{color:var(--green);}
.risk-title{font-size:1.05rem;font-weight:800;margin-bottom:6px;}
.risk-desc{font-size:0.82rem;color:var(--muted);line-height:1.5;}
.risk-score{text-align:right;flex-shrink:0;}
.score-num{font-size:2.2rem;font-weight:900;line-height:1;}
.risk-card.critical .score-num,.risk-card.high .score-num{color:var(--red);}
.risk-card.medium .score-num{color:var(--yellow);}
.risk-card.low .score-num{color:var(--green);}
.score-label{font-size:0.58rem;font-family:'Space Mono',monospace;color:var(--muted);}
.heatmap-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1rem;}
.heatmap-box h3{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;}
.heatmap-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-bottom:6px;}
.heatmap-cell{height:28px;border-radius:4px;position:relative;cursor:default;}
.heatmap-cell:hover::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:0.62rem;white-space:nowrap;z-index:10;pointer-events:none;}
.heatmap-labels{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;}
.heatmap-labels span{font-family:'Space Mono',monospace;font-size:0.48rem;color:var(--muted);text-align:center;}
.heatmap-legend{display:flex;align-items:center;gap:0.5rem;margin-top:0.8rem;font-size:0.62rem;color:var(--muted);}
.legend-bar{height:8px;flex:1;border-radius:4px;background:linear-gradient(to right,#00f5a0,#ffd166,#ff4757);}
.events-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1rem;}
.events-box h3{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;}
.event-row{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 0;border-bottom:1px solid var(--border);}
.event-row:last-child{border-bottom:none;}
.event-badge{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.event-info{flex:1;}
.event-name{font-size:0.88rem;font-weight:600;}
.event-meta{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.event-impact{font-family:'Space Mono',monospace;font-size:0.6rem;padding:3px 10px;border-radius:20px;font-weight:700;}
.impact-critical,.impact-high{background:rgba(255,71,87,0.14);color:var(--red);}
.impact-medium{background:rgba(255,209,102,0.12);color:var(--yellow);}
.impact-low{background:rgba(0,245,160,0.1);color:var(--green);}
.depart-box{background:linear-gradient(135deg,rgba(108,99,255,0.12),rgba(255,101,132,0.06));border:1px solid rgba(108,99,255,0.25);border-radius:14px;padding:1.4rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem;}
.depart-icon{font-size:2.5rem;}
.depart-label{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.depart-time{font-size:1.3rem;font-weight:900;color:#fff;margin-bottom:4px;}
.depart-reason{font-size:0.78rem;color:var(--muted);}
.transport-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1rem;}
.transport-box h3{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;}
.transport-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
.transport-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:1rem;display:flex;flex-direction:column;gap:0.4rem;}
.transport-card.best{border-color:rgba(0,245,160,0.4);background:rgba(0,245,160,0.04);}
.transport-card.avoid{border-color:rgba(255,71,87,0.2);opacity:0.65;}
.t-emoji{font-size:1.4rem;}
.t-name{font-size:0.88rem;font-weight:700;}
.t-desc{font-size:0.7rem;color:var(--muted);line-height:1.4;}
.t-tag{font-family:'Space Mono',monospace;font-size:0.56rem;padding:3px 8px;border-radius:6px;width:fit-content;font-weight:700;}
.tag-best{background:rgba(0,245,160,0.15);color:var(--green);}
.tag-avoid{background:rgba(255,71,87,0.15);color:var(--red);}
.tag-ok{background:rgba(255,209,102,0.12);color:var(--yellow);}
.share-btn{width:100%;padding:0.85rem;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;margin-bottom:2rem;}
.share-btn:hover{border-color:var(--accent);color:var(--accent);}
footer{text-align:center;padding:1.5rem;font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);border-top:1px solid var(--border);position:relative;z-index:1;}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-glow"></div><div class="bg-glow2"></div>
<header>
  <div class="logo">
    <div class="logo-icon">🗓️</div>
    <div><h1>EventJam</h1><p>Event-Aware Congestion Intelligence · Bangalore</p></div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>
<main>
  <div class="weather-bar">
    <div class="weather-stat"><span class="w-label">Bangalore Weather</span><strong id="w-temp">Loading...</strong></div>
    <div class="sep"></div>
    <div class="weather-stat"><span class="w-label">Condition</span><strong id="w-desc">—</strong></div>
    <div class="sep"></div>
    <div class="weather-stat"><span class="w-label">Humidity</span><strong id="w-humidity">—</strong></div>
    <div class="weather-impact" id="w-impact">—</div>
  </div>

  <div class="section-label">Plan Your Journey</div>
  <div class="input-row">
    <div class="input-box"><label>FROM</label><input type="text" id="from" placeholder="e.g. Koramangala"/></div>
    <div class="input-box"><label>TO</label><input type="text" id="to" placeholder="e.g. Whitefield"/></div>
  </div>
  <div class="input-row">
    <div class="input-box"><label>Departure Time</label><input type="time" id="deptime" value="18:00"/></div>
    <div class="input-box">
      <label>Route Area</label>
      <select id="area">
        <option value="mg_road">MG Road / Cubbon Park</option>
        <option value="chinnaswamy">Chinnaswamy / Shivajinagar</option>
        <option value="outer_ring">Outer Ring Road / Marathahalli</option>
        <option value="koramangala">Koramangala / BTM Layout</option>
        <option value="electronic_city">Electronic City / Hosur Rd</option>
        <option value="whitefield">Whitefield / ITPL</option>
        <option value="hebbal">Hebbal / Bellary Road</option>
      </select>
    </div>
  </div>
  <button class="btn" onclick="analyze()">⚡ Analyze Live Congestion</button>

  <div id="results">
    <div id="risk-container"></div>
    <div id="heatmap-container"></div>
    <div id="events-container"></div>
    <div id="depart-container"></div>
    <div id="transport-container"></div>
    <button class="share-btn" onclick="shareAlert()">📤 Share Congestion Alert</button>
  </div>
</main>
<footer>EventJam · Smart Mobility Intelligence · PromptWars × DSU 2026 · Live weather via wttr.in</footer>

<script>
// Clock
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});},1000);

// Live weather - wttr.in (no API key needed)
window._rainFactor=0;
async function loadWeather(){
  try{
    const r=await fetch('https://wttr.in/Bangalore?format=j1');
    const d=await r.json();
    const c=d.current_condition[0];
    document.getElementById('w-temp').textContent=c.temp_C+'°C';
    const desc=c.weatherDesc[0].value;
    document.getElementById('w-desc').textContent=desc;
    document.getElementById('w-humidity').textContent=c.humidity+'%';
    const rain=parseFloat(c.precipMM);
    const imp=document.getElementById('w-impact');
    if(rain>2||desc.toLowerCase().includes('rain')){
      imp.textContent='🌧️ Rain → +25% Congestion';
      imp.style.cssText='background:rgba(255,71,87,0.12);color:var(--red);';
      window._rainFactor=25;
    }else if(desc.toLowerCase().includes('cloud')){
      imp.textContent='☁️ Cloudy → +10% Congestion';
      imp.style.cssText='background:rgba(255,209,102,0.1);color:var(--yellow);';
      window._rainFactor=10;
    }else{
      imp.textContent='☀️ Clear → Normal Traffic';
      imp.style.cssText='background:rgba(0,245,160,0.08);color:var(--green);';
      window._rainFactor=0;
    }
  }catch(e){document.getElementById('w-temp').textContent='Unavailable';}
}
loadWeather();

const EVENTS={
  mg_road:[{name:'Cubbon Park Cultural Fest',time:'5PM–9PM',impact:'high',emoji:'🎭',zone:'Cubbon Park'},{name:'Commercial St. Weekend Rush',time:'4PM–9PM',impact:'medium',emoji:'🛍️',zone:'Commercial Street'}],
  chinnaswamy:[{name:'IPL Match: RCB vs CSK',time:'7:30PM',impact:'critical',emoji:'🏏',zone:'Chinnaswamy Stadium'},{name:'Pre-match crowd surge',time:'5PM–7:30PM',impact:'high',emoji:'🚶',zone:'Shivajinagar'}],
  outer_ring:[{name:'IT Park Mass Shift End',time:'5:45PM–7:30PM',impact:'high',emoji:'💼',zone:'Marathahalli'},{name:'Outer Ring Rd Construction',time:'All Day',impact:'medium',emoji:'🚧',zone:'Silk Board–Marathahalli'}],
  koramangala:[{name:'Koramangala Food Festival',time:'6PM–11PM',impact:'medium',emoji:'🍜',zone:'80 Feet Road'},{name:'Startup Demo Night',time:'7PM–9PM',impact:'low',emoji:'🚀',zone:'5th Block'}],
  electronic_city:[{name:'Infosys / Wipro Shift End',time:'6PM–7:30PM',impact:'high',emoji:'🏢',zone:'E-City Phase 1'},{name:'Hosur Road Toll Backup',time:'5PM–8PM',impact:'high',emoji:'🚗',zone:'Hosur Road'}],
  whitefield:[{name:'Phoenix Mall Weekend Rush',time:'5PM–10PM',impact:'medium',emoji:'🏬',zone:'Whitefield Main Rd'},{name:'ITPL Tech Park Exit Rush',time:'6PM–8PM',impact:'high',emoji:'💻',zone:'ITPL'}],
  hebbal:[{name:'Airport Pickup/Drop Peak',time:'5PM–8PM',impact:'high',emoji:'✈️',zone:'Bellary Road'},{name:'Hebbal Flyover Merge Jam',time:'6PM–8PM',impact:'medium',emoji:'🌉',zone:'Hebbal Junction'}],
};

const BASE_HEAT={
  mg_road:    [30,55,75,40,35,40,45,35,40,55,70,85],
  chinnaswamy:[25,50,70,35,30,35,40,35,40,65,90,98],
  outer_ring: [35,80,90,45,35,40,45,40,50,70,95,88],
  koramangala:[30,60,75,45,40,45,50,45,50,65,75,80],
  electronic_city:[25,50,65,35,30,35,40,35,45,65,90,85],
  whitefield: [30,55,70,40,35,40,45,40,50,65,80,88],
  hebbal:     [35,70,85,45,35,40,45,40,55,70,88,80],
};
const HOURS=['7a','8a','9a','10a','11a','12p','1p','2p','3p','4p','5p','6p'];

function heatColor(v){
  if(v<35)return`rgba(0,245,160,${0.3+v/120})`;
  if(v<60)return`rgba(255,209,102,${0.3+v/120})`;
  if(v<80)return`rgba(255,140,66,${0.4+v/120})`;
  return`rgba(255,71,87,${0.5+v/120})`;
}
function getRisk(s){return s>=80?'critical':s>=60?'high':s>=35?'medium':'low';}

function analyze(){
  const from=document.getElementById('from').value||'Your Location';
  const to=document.getElementById('to').value||'Destination';
  const area=document.getElementById('area').value;
  const hour=parseInt(document.getElementById('deptime').value.split(':')[0]);
  const rain=window._rainFactor||0;
  const events=EVENTS[area]||[];
  const baseHeat=BASE_HEAT[area]||BASE_HEAT.mg_road;
  const hIdx=Math.max(0,Math.min(hour-7,11));
  const hasCrit=events.some(e=>e.impact==='critical');
  const highCnt=events.filter(e=>e.impact==='high'||e.impact==='critical').length;
  const score=Math.min(99,baseHeat[hIdx]+rain+(hasCrit?15:0)+(highCnt>=2?5:0));
  const level=getRisk(score);

  const rMap={
    critical:{icon:'🚨',title:`Critical Congestion: ${from} → ${to}`,desc:`Extreme delays expected. Major events + ${rain>0?'rain + ':''}peak hour collision. Avoid driving. Google Maps won't warn you about this.`},
    high:{icon:'⚠️',title:`High Congestion Risk Detected`,desc:`Significant delays on ${from} → ${to}. Event-driven traffic building up. Add 45–60 min buffer or switch transport.`},
    medium:{icon:'🟡',title:`Moderate Disruption Expected`,desc:`${from} → ${to} has some congestion from nearby events. Add 20–30 min buffer.`},
    low:{icon:'✅',title:`Route Looks Clear`,desc:`No major disruptions for ${from} → ${to}. Standard commute time expected.`},
  };
  const r=rMap[level];
  document.getElementById('risk-container').innerHTML=`
    <div class="risk-card ${level}">
      <div class="risk-icon">${r.icon}</div>
      <div class="risk-body">
        <div class="risk-level">⬤ ${level.toUpperCase()} RISK</div>
        <div class="risk-title">${r.title}</div>
        <div class="risk-desc">${r.desc}</div>
      </div>
      <div class="risk-score"><div class="score-num">${score}</div><div class="score-label">RISK / 100</div></div>
    </div>`;

  const cells=baseHeat.map((v,i)=>{
    const adj=Math.min(99,v+(i===hIdx?rain:0));
    return`<div class="heatmap-cell" style="background:${heatColor(adj)};${i===hIdx?'outline:2px solid #fff;':''}opacity:${i===hIdx?1:0.75};" data-tip="${HOURS[i]}: Risk ${adj}"></div>`;
  }).join('');
  document.getElementById('heatmap-container').innerHTML=`
    <div class="heatmap-box">
      <h3>📊 Congestion Heatmap — Today</h3>
      <div class="heatmap-grid">${cells}</div>
      <div class="heatmap-labels">${HOURS.map(h=>`<span>${h}</span>`).join('')}</div>
      <div class="heatmap-legend"><span>Low</span><div class="legend-bar"></div><span>Critical</span></div>
    </div>`;

  const iCls={critical:'impact-critical',high:'impact-high',medium:'impact-medium',low:'impact-low'};
  const iBadge={critical:'var(--red)',high:'var(--red)',medium:'var(--yellow)',low:'var(--green)'};
  document.getElementById('events-container').innerHTML=`
    <div class="events-box"><h3>📍 Live Events Near Route</h3>
    ${events.map(e=>`<div class="event-row">
      <div class="event-badge" style="background:${iBadge[e.impact]}"></div>
      <div class="event-info"><div class="event-name">${e.emoji} ${e.name}</div><div class="event-meta">${e.time} · ${e.zone}</div></div>
      <span class="event-impact ${iCls[e.impact]}">${e.impact.toUpperCase()}</span>
    </div>`).join('')||'<div class="event-row"><span style="color:var(--muted)">No events detected</span></div>'}
    </div>`;

  let dt,dr;
  if(level==='critical'||level==='high'){
    dt=hour>=17&&hour<=20?'Before 4:30 PM or after 9:30 PM':'Leave immediately';
    dr=hour>=17&&hour<=20?'Peak event+rush window. Leaving now = maximum delay.':'Outside worst window but risk still high.';
  }else if(level==='medium'){dt='Before 5:00 PM or after 8:00 PM';dr='Moderate events — early/late departure avoids congestion.';}
  else{dt='Anytime — route is clear';dr='No major events or congestion detected.';}

  document.getElementById('depart-container').innerHTML=`
    <div class="depart-box">
      <div class="depart-icon">⏰</div>
      <div><div class="depart-label">Recommended Departure</div><div class="depart-time">${dt}</div><div class="depart-reason">${dr}</div></div>
    </div>`;

  const transports=[
    {emoji:'🚇',name:'Namma Metro',desc:'Completely bypasses road congestion. Best option during events.',tag:'tag-best',cls:'best'},
    {emoji:'🛺',name:'Auto Rickshaw',desc:'Can navigate lanes. Avoid event epicentre roads.',tag:'tag-ok',cls:''},
    {emoji:'🚌',name:'BMTC Bus',desc:'Avoid near event venues — buses get stuck in jams.',tag:'tag-avoid',cls:'avoid'},
    {emoji:'🚗',name:'Cab / Car',desc:`Add ${score>70?'60–90':'30–45'} min buffer. High idle time near events.`,tag:'tag-avoid',cls:'avoid'},
  ];
  document.getElementById('transport-container').innerHTML=`
    <div class="transport-box"><h3>🚦 Transport Mode Analysis</h3>
    <div class="transport-grid">${transports.map(t=>`
      <div class="transport-card ${t.cls}">
        <div class="t-emoji">${t.emoji}</div>
        <div class="t-name">${t.name}</div>
        <div class="t-desc">${t.desc}</div>
        <span class="t-tag ${t.tag}">${t.tag==='tag-best'?'RECOMMENDED':t.tag==='tag-avoid'?'AVOID':'OKAY'}</span>
      </div>`).join('')}</div></div>`;

  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

function shareAlert(){
  const from=document.getElementById('from').value||'Origin';
  const to=document.getElementById('to').value||'Destination';
  const text=`🚨 EventJam Alert: Congestion detected on ${from}→${to}. Check live: https://nthrivedha.github.io/EventJam-mobility-ai/`;
  if(navigator.share)navigator.share({title:'EventJam Alert',text});
  else{navigator.clipboard.writeText(text);alert('Alert copied!');}
}
</script>
